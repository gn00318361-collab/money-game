<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金融生存戰 - 即時排行榜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseGold { 0%,100%{ text-shadow: 0 0 10px rgba(255,215,0,0.3); } 50%{ text-shadow: 0 0 25px rgba(255,215,0,0.7); } }
        @keyframes crisisFlash { 0%{ background-color: #1f2937; } 50%{ background-color: #7f1d1d; } 100%{ background-color: #1f2937; } }
        .slide-in { animation: slideIn 0.4s ease-out forwards; }
        .crown-glow { animation: pulseGold 2s ease-in-out infinite; }
        .crisis-flash { animation: crisisFlash 0.5s ease-in-out 3; }
        .rank-bar {
            transition: width 0.8s ease-in-out, background-color 0.5s;
        }
        /* 排名變動箭頭 */
        .rank-up { color: #22c55e; }
        .rank-down { color: #ef4444; }
        .rank-same { color: #6b7280; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-6">

    <div class="max-w-3xl mx-auto">
        <!-- 標題區 -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black text-yellow-500 mb-2 crown-glow">🏆 即時排行榜</h1>
            <p class="text-gray-400 text-sm">金融生存戰 — 誰能在黑天鵝中活到最後？</p>
            <div class="flex justify-center gap-6 mt-4">
                <div class="bg-gray-800 px-4 py-2 rounded-lg">
                    <p class="text-xs text-gray-500">在線玩家</p>
                    <p id="player-count" class="text-xl font-bold text-green-400">0</p>
                </div>
                <div class="bg-gray-800 px-4 py-2 rounded-lg">
                    <p class="text-xs text-gray-500">最高資產</p>
                    <p id="top-score" class="text-xl font-bold text-yellow-400">$0</p>
                </div>
                <div class="bg-gray-800 px-4 py-2 rounded-lg">
                    <p class="text-xs text-gray-500">已破產</p>
                    <p id="bankrupt-count" class="text-xl font-bold text-red-400">0</p>
                </div>
            </div>
        </header>

        <!-- 最新事件跑馬燈 -->
        <div id="event-banner" class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 mb-6 text-center text-sm text-gray-400 overflow-hidden" style="min-height:2em;">
            等待事件中...
        </div>

        <!-- 排行榜列表 -->
        <div id="leaderboard" class="space-y-3">
            <div class="text-center text-gray-500 py-12">
                <p class="text-5xl mb-4">📡</p>
                <p>等待玩家連線中...</p>
            </div>
        </div>

        <!-- 底部資訊 -->
        <div class="text-center mt-8 text-xs text-gray-600">
            <p>資料即時同步自 Firebase — 每秒自動更新</p>
        </div>
    </div>

<script>
    // Firebase 配置（與 admin.html / monetgame.html 相同）
    const firebaseConfig = {
        apiKey: "AIzaSyC22jClkL3BnJifDpAaaz40kmyKEMZravY",
        authDomain: "csps-899f4.firebaseapp.com",
        databaseURL: "https://csps-899f4-default-rtdb.firebaseio.com",
        projectId: "csps-899f4",
        storageBucket: "csps-899f4.firebasestorage.app",
        appId: "1:719907049932:web:e7a8ac6b6dd04f11048d69"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let prevRanks = {}; // 記錄上一次排名，計算名次變動

    // 獎牌 / 排名樣式
    const medals = ['🥇', '🥈', '🥉'];
    const rankColors = [
        'from-yellow-600/30 to-yellow-900/10 border-yellow-500/50',
        'from-gray-400/20 to-gray-800/10 border-gray-400/40',
        'from-orange-600/20 to-orange-900/10 border-orange-500/40'
    ];
    const barColors = ['bg-yellow-500', 'bg-gray-400', 'bg-orange-500', 'bg-blue-500', 'bg-purple-500', 'bg-green-500', 'bg-pink-500', 'bg-cyan-500'];

    // ===== 監聽玩家資料 =====
    db.ref('players').on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) {
            document.getElementById('leaderboard').innerHTML = '<div class="text-center text-gray-500 py-12"><p class="text-5xl mb-4">📡</p><p>等待玩家連線中...</p></div>';
            document.getElementById('player-count').textContent = '0';
            document.getElementById('top-score').textContent = '$0';
            document.getElementById('bankrupt-count').textContent = '0';
            return;
        }

        // 轉成陣列並排序
        const players = Object.entries(data).map(([name, info]) => ({
            name,
            score: info.score || 0,
            lastUpdate: info.lastUpdate || 0
        }));

        // 依分數排序（高→低）
        players.sort((a, b) => b.score - a.score);

        // 統計
        const totalPlayers = players.length;
        const topScore = players.length > 0 ? players[0].score : 0;
        const bankruptCount = players.filter(p => p.score <= 0).length;

        document.getElementById('player-count').textContent = totalPlayers;
        document.getElementById('top-score').textContent = `$${topScore.toLocaleString()}`;
        document.getElementById('bankrupt-count').textContent = bankruptCount;

        // 算出最高分（用來計算條狀圖比例）
        const maxScore = Math.max(topScore, 1);

        // 建立新排名對照
        const newRanks = {};
        players.forEach((p, i) => { newRanks[p.name] = i + 1; });

        // 渲染排行榜
        let html = '';
        players.forEach((player, index) => {
            const rank = index + 1;
            const medal = rank <= 3 ? medals[rank - 1] : `<span class="text-gray-500 font-mono">${rank}</span>`;
            const colorClass = rank <= 3 ? rankColors[rank - 1] : 'from-gray-800/50 to-gray-900/30 border-gray-700/50';
            const barColor = barColors[Math.min(index, barColors.length - 1)];
            const barWidth = Math.max(5, (player.score / maxScore) * 100);
            const isAlive = player.score > 0;

            // 名次變動
            let rankChangeHtml = '';
            if (prevRanks[player.name] !== undefined) {
                const diff = prevRanks[player.name] - rank;
                if (diff > 0) {
                    rankChangeHtml = `<span class="rank-up text-xs ml-1">▲${diff}</span>`;
                } else if (diff < 0) {
                    rankChangeHtml = `<span class="rank-down text-xs ml-1">▼${Math.abs(diff)}</span>`;
                }
            }

            // 離線判定（超過 5 秒沒更新）
            const isOnline = (Date.now() - player.lastUpdate) < 5000;
            const statusDot = isOnline
                ? '<div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>'
                : '<div class="w-2 h-2 bg-gray-600 rounded-full"></div>';

            html += `
                <div class="bg-gradient-to-r ${colorClass} border rounded-xl px-4 py-3 slide-in ${!isAlive ? 'opacity-40' : ''}" style="animation-delay: ${index * 0.05}s;">
                    <div class="flex items-center justify-between mb-1">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl w-10 text-center">${medal}</span>
                            ${statusDot}
                            <div>
                                <span class="font-bold text-lg ${rank === 1 ? 'text-yellow-400 crown-glow' : ''}">${player.name}</span>
                                ${rankChangeHtml}
                                ${!isAlive ? '<span class="text-red-500 text-xs ml-2">💀 破產</span>' : ''}
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="font-mono font-bold text-lg ${player.score >= 1000 ? 'text-green-400' : player.score > 0 ? 'text-yellow-400' : 'text-red-500'}">
                                $${player.score.toLocaleString()}
                            </span>
                        </div>
                    </div>
                    <div class="w-full bg-gray-800 rounded-full h-2 overflow-hidden">
                        <div class="rank-bar ${barColor} h-2 rounded-full" style="width: ${barWidth}%;"></div>
                    </div>
                </div>
            `;
        });

        document.getElementById('leaderboard').innerHTML = html;
        prevRanks = newRanks;
    });

    // ===== 監聽老師事件（跑馬燈）=====
    let lastBannerEventId = 0;
    db.ref('global_event').on('value', (snapshot) => {
        const event = snapshot.val();
        if (!event || event.id === lastBannerEventId) return;
        lastBannerEventId = event.id;

        const banner = document.getElementById('event-banner');
        banner.textContent = `⚠️ 市場快訊：${event.msg}`;
        banner.className = 'bg-red-900/50 border border-red-500 rounded-lg px-4 py-2 mb-6 text-center text-sm text-red-300 font-bold crisis-flash';

        // 3 秒後恢復
        setTimeout(() => {
            banner.className = 'bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 mb-6 text-center text-sm text-gray-400';
        }, 5000);
    });
</script>
</body>
</html>
