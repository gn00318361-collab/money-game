<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>金融遊戲 - 老師控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 text-white p-10">
    <div class="max-w-2xl mx-auto border-2 border-red-500 p-8 rounded-2xl bg-slate-800 shadow-2xl">
        <h1 class="text-4xl font-black text-red-500 mb-8 text-center">🛑 市場制裁者控制台</h1>

        <div class="grid grid-cols-1 gap-6">
            <button onclick="sendCrisis('tech', 0.5, '科技股崩盤！伺服器大斷電！')" class="bg-red-600 hover:bg-red-700 p-6 rounded-xl text-2xl font-bold transition-all transform active:scale-95">
                📉 發動：科技股腰斬 (-50%)
            </button>

            <button onclick="sendCrisis('energy', 0.4, '能源危機！全球大停電！')" class="bg-orange-600 hover:bg-orange-700 p-6 rounded-xl text-2xl font-bold transition-all transform active:scale-95">
                🔥 發動：能源股暴跌 (-60%)
            </button>

            <button onclick="sendCrisis('cash', 0.7, '惡性通膨！現金購買力下降！')" class="bg-yellow-600 hover:bg-yellow-700 p-6 rounded-xl text-2xl font-bold transition-all transform active:scale-95">
                💸 發動：現金貶值 (-30%)
            </button>

            <div class="h-1 bg-slate-700 my-4"></div>

            <button onclick="resetGame()" class="bg-gray-500 hover:bg-gray-600 p-4 rounded-xl text-xl font-bold">
                🔄 重置所有玩家數據 (下一班開始用)
            </button>
        </div>
        <p id="status" class="mt-6 text-center text-green-400 font-mono"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC22jClkL3BnJifDpAaaz40kmyKEMZravY",
            authDomain: "csps-899f4.firebaseapp.com",
            databaseURL: "https://csps-899f4-default-rtdb.firebaseio.com",
            projectId: "csps-899f4",
            storageBucket: "csps-899f4.firebasestorage.app",
            appId: "1:719907049932:web:e7a8ac6b6dd04f11048d69"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function sendCrisis(target, impact, msg) {
            const eventId = Date.now();
            db.ref('global_event').set({
                id: eventId,
                target: target,
                impact: impact,
                msg: msg
            });
            document.getElementById('status').innerText = `已發動：${msg}`;
            setTimeout(() => { document.getElementById('status').innerText = ""; }, 3000);
        }

        function resetGame() {
            if(confirm("確定要刪除所有學生數據嗎？")) {
                db.ref('players').remove();
                alert("數據已清空！");
            }
        }
    </script>
</body>
</html>
